services:
  - type: web
    name: quiz-prep-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://ravijeetchandra.github.io
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: PYTHON_VERSION
        value: 3.12.0
# SECURITY NOTE:
# - GROQ_API_KEY is set to `sync: false`, meaning it is NEVER
#   stored in this file or in git. You must paste it manually in
#   the Render dashboard after deployment.
# - The Groq key, JWT secret, and database credentials live
#   ONLY as server environment variables. They are NEVER sent
#   to the browser.
# - CORS restricts API access to only your GitHub Pages domain.
# - Rate limiting (20 requests/min per IP) protects against abuse.
