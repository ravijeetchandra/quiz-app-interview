<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - QuizPrep</title>
    <link rel="stylesheet" href="../css/style.css?v=4">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-brand">QuizPrep</a>
            <div class="nav-links">
                <a href="quiz.html" class="nav-link">Take Quiz</a>
                <a href="login.html" class="nav-link">Login</a>
                <a href="register.html" class="nav-link">Sign Up</a>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <h1>Forgot Password</h1>
            <p class="auth-subtitle">Enter your email and we'll send a reset link</p>
            <form id="forgotPasswordForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-error" id="forgotError"></div>
                <div class="form-success" id="forgotSuccess" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-block" id="forgotBtn">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="btn-loader" style="display:none">⏳</span>
                </button>
            </form>
            <p class="auth-footer"><a href="login.html">← Back to Login</a></p>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>
    <script src="../js/api.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
