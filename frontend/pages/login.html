<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuizPrep</title>
    <link rel="stylesheet" href="../css/style.css?v=4">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-brand">QuizPrep</a>
            <div class="nav-links">
                <a href="quiz.html" class="nav-link">Take Quiz</a>
                <a href="donate.html" class="nav-link">☕ Donate</a>
                <a href="register.html" class="nav-link">Sign Up</a>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Log in to continue your practice</p>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required minlength="8">
                </div>
                <div class="form-group form-checkbox">
                    <label>
                        <input type="checkbox" id="rememberMe" checked>
                        Remember me
                    </label>
                </div>
                <div class="form-error" id="loginError"></div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    <span class="btn-text">Log In</span>
                    <span class="btn-loader" style="display:none">⏳</span>
                </button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="register.html">Sign up</a></p>
            <p class="auth-guest"><a href="quiz.html">Continue as guest →</a></p>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>
    <script src="../js/api.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
